<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>拆分父子行表格 Demo</title>

<style>
body {
  font-family: system-ui, sans-serif;
  padding: 20px;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px 8px;
  text-align: center;
}

/* 父行样式 */
.parent {
  background: #f5f5f5;
  font-weight: bold;
}

/* 子行样式 */
.child {
  background: #fafcff;
}

.child td {
  border-style: dashed;
}

/* 控件 */
input {
  width: 110px;
}

button {
  padding: 4px 10px;
  margin: 2px;
  cursor: pointer;
}

.btn-del {
  background: #c0392b;
  color: white;
  border: none;
}

.debug {
  margin-top: 20px;
  background: #000;
  color: #0f0;
  padding: 10px;
  font-size: 12px;
  height: 200px;
  overflow-y: auto;
}
</style>
</head>
<body>

<h2>不良项拆分 - 纯 HTML Demo</h2>

<table class="table">
  <thead>
    <tr>
      <th>序号</th>
      <th>问题类型</th>
      <th>责任方</th>
      <th>处理人</th>
      <th>确认数量</th>
      <th>操作</th>
    </tr>
  </thead>

  <tbody id="table-body"></tbody>

</table>

<h3>实时数据状态</h3>
<pre class="debug" id="debug"></pre>

<script>
let uid = 1

const rows = [
  {
    id: uid++,
    type: "压铸-气孔",
    owner: "供应商A",
    qty: 100,
    children: []
  },
  {
    id: uid++,
    type: "压铸-裂纹",
    owner: "供应商B",
    qty: 200,
    children: []
  }
]

/**
 * 渲染全部表格
 */
function render() {

  const tbody = document.getElementById("table-body")
  tbody.innerHTML = ""

  rows.forEach((parent, pIndex) => {

    // --- 父行 ---
    tbody.innerHTML += `
      <tr class="parent">
        <td>${pIndex + 1}</td>
        <td>${parent.type}</td>
        <td>
          <input value="${parent.owner}" 
            ${parent.children.length ? "disabled" : ""} 
            oninput="parentOwnerChange(${parent.id}, this.value)">
        </td>
        <td>-</td>
        <td>${parent.qty}</td>
        <td>
          <button onclick="split(${parent.id})">拆分</button>
        </td>
      </tr>
    `

    // --- 子行 ---
    parent.children.forEach((child, cIndex) => {
      tbody.innerHTML += `
        <tr class="child">
          <td></td>
          <td>${parent.type}</td>
          <td>
            <input 
              value="${child.owner}" 
              ${cIndex === 0 ? "disabled" : ""}
              oninput="childOwnerChange(${parent.id}, ${child.id}, this.value)"
            >
          </td>
          <td>
            <input 
              value="${child.handler}"
              oninput="childHandlerChange(${parent.id}, ${child.id}, this.value)"
            >
          </td>
          <td>
            <input type="number" min="0"
              value="${child.qty}"
              oninput="childQtyChange(${parent.id}, ${child.id}, this.value)"
            >
          </td>
          <td>
            <button class="btn-del" 
              onclick="deleteChild(${parent.id})">
              删除子行
            </button>
          </td>
        </tr>
      `
    })

  })

  document.getElementById("debug").innerText =
    JSON.stringify(rows, null, 2)
}

/**
 * 拆分规则
 */
function split(parentId) {

  const parent = rows.find(r => r.id === parentId)
  if (!parent) return

  // 第一次 -> 添加2行
  if (parent.children.length === 0) {
    addChild(parent)
    addChild(parent)

    parent.children[0].owner = parent.owner
    render()
    return
  }

  // 其余 -> 追加1行
  addChild(parent)
  render()

}

/**
 * 添加子行
 */
function addChild(parent) {
  parent.children.push({
    id: uid++,
    owner: parent.owner,
    handler: "",
    qty: 0
  })
}

/**
 * 删除规则
 */
function deleteChild(parentId) {

  const parent = rows.find(r => r.id === parentId)
  if (!parent || parent.children.length === 0) return

  parent.children.pop()

  // 回滚父行状态
  if (parent.children.length < 2) {
    parent.children = []
  }

  render()
}

/***************
 * 数据双向更新
 ****************/
function parentOwnerChange(parentId, value) {
  rows.find(r => r.id === parentId).owner = value
}

function childOwnerChange(parentId, childId, value) {
  rows.find(r => r.id === parentId)
      .children.find(c => c.id === childId).owner = value
}

function childHandlerChange(parentId, childId, value) {
  rows.find(r => r.id === parentId)
      .children.find(c => c.id === childId).handler = value
}

function childQtyChange(parentId, childId, value) {
  rows.find(r => r.id === parentId)
      .children.find(c => c.id === childId).qty = Number(value)
}

/// 初始化渲染
render()

</script>

</body>
</html>
